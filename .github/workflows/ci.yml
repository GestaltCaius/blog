name: CI
on:
  push:
    branches: [main]
  pull_request:
jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install
      - run: bun run astro check
      - run: bunx prettier --check .
      - run: bunx cspell@8 "src/content/**/*.md"
      - run: bun run build
      - run: bunx linkinator ./dist --recurse --skip "^https?://"
